# 数据接入字段映射配置
# 潘达工程-商务成本智能决策体系
# 数据空间: space__panda_construction

version: "1.0"
space_id: "space__panda_construction"

# 通用配置
common:
  date_key_calculation: true
  created_at_auto: true
  warning_level_mapping: true

# 表映射配置

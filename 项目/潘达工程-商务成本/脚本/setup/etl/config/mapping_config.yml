# 校验器配置
validators:
  report_period_validator:
    pattern: "^\\d{4}-\\d{2}$"
    error_message: "report_period格式错误，应为YYYY-MM格式"
  
  cost_level_validator:
    allowed_values: ["L1", "L2", "L3"]
    error_message: "cost_level必须为L1、L2或L3"

# 转换器配置
transformers:
  warning_level_mapping:
    mapping:
      "绿": "green"
      "黄": "yellow"
      "红": "red"
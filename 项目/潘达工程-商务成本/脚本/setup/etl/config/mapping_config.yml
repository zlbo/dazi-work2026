  # ========== 维度表 ==========
  dim_project:
    description: "项目维度表"
    primary_key: "project_id"
    mappings:
      - source: "project_id"
        target: "project_id"
        type: "string"
        required: true
      - source: "project_name"
        target: "project_name"
        type: "string"
        required: true
      - source: "project_code"
        target: "project_code"
        type: "string"
      - source: "company_id"
        target: "company_id"
        type: "string"
      - source: "company_name"
        target: "company_name"
        type: "string"
      - source: "building_area"
        target: "building_area"
        type: "float"
      - source: "contract_amount"
        target: "contract_amount"
        type: "float"
      - source: "section_id"
        target: "section_id"
        type: "string"
      - source: "section_name"
        target: "section_name"
        type: "string"
    derived_fields:
      - name: "project_status"
        default: "在建"
      - name: "contractor_id"
        default: ""
      - name: "employer_id"
        default: ""
      - name: "contractor_name"
        default: ""
      - name: "employer_name"
        default: ""
      - name: "created_at"
        expression: "current_datetime()"

  dim_company:
    description: "分公司维度表"
    primary_key: "company_id"
    mappings:
